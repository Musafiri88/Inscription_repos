<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Inscriptions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            width: 100%;
            max-width: 500px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .message {
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: center;
            font-weight: 600;
            display: none;
        }

        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .users-list {
            margin-top: 30px;
            border-top: 2px solid #e0e0e0;
            padding-top: 20px;
        }

        .users-list h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.5em;
        }

        .user-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .user-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }

        .delete-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .delete-btn:hover {
            background: #c82333;
            transform: scale(1.05);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            color: #666;
            font-size: 0.9em;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Inscription</h1>
        
        <form id="registrationForm">
            <div class="form-group">
                <label for="firstName">Prénom</label>
                <input type="text" id="firstName" name="firstName" required>
            </div>
            
            <div class="form-group">
                <label for="lastName">Nom</label>
                <input type="text" id="lastName" name="lastName" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" required minlength="6">
            </div>
            
            <div class="form-group">
                <label for="confirmPassword">Confirmer le mot de passe</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required>
            </div>
            
            <button type="submit" class="btn">S'inscrire</button>
        </form>
        
        <div id="message" class="message"></div>
        
        <div class="stats" id="stats">
            <div class="stat-item">
                <div class="stat-number" id="totalUsers">0</div>
                <div class="stat-label">Utilisateurs</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="todayUsers">0</div>
                <div class="stat-label">Aujourd'hui</div>
            </div>
        </div>
        
        <div class="users-list" id="usersList" style="display: none;">
            <h2>Utilisateurs inscrits</h2>
            <div id="usersContainer"></div>
        </div>
    </div>

    <script>
        class UserManager {
            constructor() {
                this.users = JSON.parse(localStorage.getItem('registeredUsers')) || [];
                this.init();
            }

            init() {
                this.bindEvents();
                this.updateStats();
                this.displayUsers();
            }

            bindEvents() {
                document.getElementById('registrationForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.handleRegistration();
                });
            }

            handleRegistration() {
                const formData = new FormData(document.getElementById('registrationForm'));
                const user = {
                    firstName: formData.get('firstName').trim(),
                    lastName: formData.get('lastName').trim(),
                    email: formData.get('email').trim().toLowerCase(),
                    password: formData.get('password'),
                    confirmPassword: formData.get('confirmPassword'),
                    registrationDate: new Date().toISOString()
                };

                // Validation
                if (!this.validateUser(user)) {
                    return;
                }

                // Vérifier si l'email existe déjà
                if (this.userExists(user.email)) {
                    this.showMessage('Un utilisateur avec cet email existe déjà!', 'error');
                    return;
                }

                // Ajouter l'utilisateur
                this.addUser(user);
                this.showMessage('Inscription réussie!', 'success');
                this.resetForm();
            }

            validateUser(user) {
                // Validation des champs vides
                if (!user.firstName || !user.lastName || !user.email || !user.password) {
                    this.showMessage('Tous les champs sont obligatoires!', 'error');
                    return false;
                }

                // Validation de l'email
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(user.email)) {
                    this.showMessage('Veuillez entrer un email valide!', 'error');
                    return false;
                }

                // Validation du mot de passe
                if (user.password.length < 6) {
                    this.showMessage('Le mot de passe doit contenir au moins 6 caractères!', 'error');
                    return false;
                }

                if (user.password !== user.confirmPassword) {
                    this.showMessage('Les mots de passe ne correspondent pas!', 'error');
                    return false;
                }

                return true;
            }

            userExists(email) {
                return this.users.some(user => user.email === email);
            }

            addUser(user) {
                // Stocker le mot de passe de manière sécurisée (hash simple pour la démo)
                const userToStore = {
                    id: Date.now(),
                    firstName: user.firstName,
                    lastName: user.lastName,
                    email: user.email,
                    passwordHash: btoa(user.password), // Base64 encoding pour la démo
                    registrationDate: user.registrationDate
                };

                this.users.push(userToStore);
                this.saveUsers();
                this.updateStats();
                this.displayUsers();
            }

            deleteUser(userId) {
                this.users = this.users.filter(user => user.id !== userId);
                this.saveUsers();
                this.updateStats();
                this.displayUsers();
                this.showMessage('Utilisateur supprimé avec succès!', 'success');
            }

            saveUsers() {
                localStorage.setItem('registeredUsers', JSON.stringify(this.users));
            }

            updateStats() {
                const totalUsers = this.users.length;
                const today = new Date().toDateString();
                const todayUsers = this.users.filter(user => 
                    new Date(user.registrationDate).toDateString() === today
                ).length;

                document.getElementById('totalUsers').textContent = totalUsers;
                document.getElementById('todayUsers').textContent = todayUsers;
            }

            displayUsers() {
                const container = document.getElementById('usersContainer');
                const usersList = document.getElementById('usersList');
                
                if (this.users.length === 0) {
                    usersList.style.display = 'none';
                    return;
                }

                usersList.style.display = 'block';
                container.innerHTML = '';

                this.users.forEach(user => {
                    const userElement = document.createElement('div');
                    userElement.className = 'user-item';
                    userElement.innerHTML = `
                        <div>
                            <strong>${user.firstName} ${user.lastName}</strong><br>
                            <small>${user.email}</small><br>
                            <small>Inscrit le: ${new Date(user.registrationDate).toLocaleDateString('fr-FR')}</small>
                        </div>
                        <button class="delete-btn" onclick="userManager.deleteUser(${user.id})">Supprimer</button>
                    `;
                    container.appendChild(userElement);
                });
            }

            showMessage(text, type) {
                const messageElement = document.getElementById('message');
                messageElement.textContent = text;
                messageElement.className = `message ${type}`;
                messageElement.style.display = 'block';

                setTimeout(() => {
                    messageElement.style.display = 'none';
                }, 5000);
            }

            resetForm() {
                document.getElementById('registrationForm').reset();
            }
        }

        // Initialiser le gestionnaire d'utilisateurs
        const userManager = new UserManager();
    </script>
</body>
</html>
